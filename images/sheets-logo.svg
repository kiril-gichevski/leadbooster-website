<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Google Sheets icon - green spreadsheet -->
  <rect width="24" height="24" rx="3" fill="#0F9D58"/>
  <!-- Vertical column divider -->
  <line x1="9.5" y1="5.5" x2="9.5" y2="18.5" stroke="white" stroke-width="1.4" stroke-opacity="0.9"/>
  <!-- Horizontal row dividers -->
  <line x1="4" y1="9.5" x2="20" y2="9.5" stroke="white" stroke-width="1.4" stroke-opacity="0.9"/>
  <line x1="4" y1="14" x2="20" y2="14" stroke="white" stroke-width="1.4" stroke-opacity="0.9"/>
</svg>
